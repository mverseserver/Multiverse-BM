# ╔══════════════════════════════════════════════════════╗
# ║         MULTIVERSE BLACKMARKET - market.yml          ║
# ║  Definisi rarity, reward pool, dan layout GUI        ║
# ╚══════════════════════════════════════════════════════╝

# ─── Rarity Definitions ────────────────────────────────
# Setiap rarity punya:
#   name       - nama tampilan (support hex color #RRGGBB)
#   weight     - bobot random (makin kecil = makin jarang)
#   color      - warna untuk template GUI item
#   glow       - apakah item di GUI dikasih efek enchant glow
#   icon       - item ikon di filter rarity
rarities:
  common:
    name: "<gray>◆ Common</gray>"
    weight: 60
    color: "#aaaaaa"
    glow: false
    icon:
      material: STONE
      name: "<gray>◆ Common</gray>"
      lore:
        - "<dark_gray>Item umum yang mudah didapat."
        - "<dark_gray>Chance: <gray>Tinggi"

  uncommon:
    name: "<green>◆ Uncommon</green>"
    weight: 30
    color: "#55ff55"
    glow: false
    icon:
      material: IRON_INGOT
      name: "<green>◆ Uncommon</green>"
      lore:
        - "<dark_gray>Item dengan kualitas di atas rata-rata."
        - "<dark_gray>Chance: <green>Sedang"

  rare:
    name: "<aqua>◆ Rare</aqua>"
    weight: 15
    color: "#55ffff"
    glow: true
    icon:
      material: DIAMOND
      name: "<aqua>◆ Rare</aqua>"
      lore:
        - "<dark_gray>Item berharga yang jarang muncul."
        - "<dark_gray>Chance: <aqua>Rendah"

  epic:
    name: "<dark_purple>◆ Epic</dark_purple>"
    weight: 7
    color: "#aa00aa"
    glow: true
    icon:
      material: AMETHYST_SHARD
      name: "<dark_purple>◆ Epic</dark_purple>"
      lore:
        - "<dark_gray>Item kuat dengan kemampuan luar biasa."
        - "<dark_gray>Chance: <dark_purple>Sangat Rendah"

  legendary:
    name: "<gold>⚡ Legendary</gold>"
    weight: 3
    color: "#ffaa00"
    glow: true
    icon:
      material: NETHER_STAR
      name: "<gold>⚡ Legendary</gold>"
      lore:
        - "<dark_gray>Item terlangka di seluruh Multiverse."
        - "<dark_gray>Chance: <gold>Sangat Sangat Rendah"

# ─── GUI Layout ────────────────────────────────────────
gui:
  # Ukuran inventory (9, 18, 27, 36, 45, 54)
  size: 54
  # Slot info/timer
  info-slot: 4
  # Slot close button
  close-slot: 49
  # Slot rarity filter (max 6)
  rarity-filter-slots: [46, 47, 48, 50, 51, 52]
  # Slot untuk offer items
  offer-slots: [10,11,12,13,14,15,16, 19,20,21,22,23,24,25, 28,29,30,31,32,33,34]
  # Filler item
  filler:
    material: BLACK_STAINED_GLASS_PANE
    name: " "

# ─── Reward Pool ───────────────────────────────────────
# Setiap reward punya:
#   name        - nama tampilan
#   rarity      - harus sesuai dengan key di rarities atas
#   chance      - 0.0-100.0, peluang reward ini dipilih dari pool raritynya
#   stock       - stok per restock (0 = unlimited)
#   price-base  - harga dasar (dimodifikasi dynamic-pricing di config.yml)
#   price-min / price-max - override range harga (opsional, overrides variance)
#   currency    - VAULT atau PLAYERPOINTS (override default di config.yml)
#   icon        - item untuk ditampilkan di GUI
#   reward-item - item yang diberikan ke player (kosongkan jika command-only)
#   commands    - list command yang dijalankan saat beli ({player} = nama player)
