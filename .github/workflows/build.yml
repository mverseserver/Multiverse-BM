name: Build MultiverseBlackmarket

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  # Bisa juga trigger manual dari tab Actions
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: ☕ Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: 🔨 Build with Maven
        run: mvn clean package -B --file pom.xml

      - name: 📦 Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: MultiverseBlackmarket-JAR
          path: target/MultiverseBlackmarket-*.jar
          retention-days: 30

  release:
    # Hanya jalan kalau push ke main DAN ada tag v*.*.* 
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: ☕ Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: 🔨 Build with Maven
        run: mvn clean package -B --file pom.xml

      - name: 🚀 Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: target/MultiverseBlackmarket-*.jar
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
